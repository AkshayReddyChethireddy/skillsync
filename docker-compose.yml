version: '3.9'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: skillsync
      POSTGRES_USER: skillsync
      POSTGRES_PASSWORD: skillsync_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skillsync"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://skillsync:skillsync_dev@db:5432/skillsync
      SECRET_KEY: dev-secret-key-change-in-production-must-be-32-chars
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      ALGORITHM: HS256
      CORS_ORIGINS: "http://localhost:5173"
      LOG_LEVEL: INFO
      ENVIRONMENT: development
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      target: builder
    command: npm run dev -- --host 0.0.0.0
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000/api/v1
    depends_on:
      - backend

volumes:
  postgres_data:
